# configs/yelp_config_quicktest_colab.yaml
#
# Versi Colab dari yelp_config_quicktest.yaml -- HANYA beda di bagian path
# (data.raw_path, split.output_dir, logging.checkpoint_dir), yang menunjuk
# langsung ke Google Drive (BUKAN symlink, lihat diskusi sebelumnya).
#
# PENTING -- SESUAIKAN PATH INI DULU:
# Path di bawah mengasumsikan struktur folder Drive:
#   /content/drive/MyDrive/a2fusionrs/data/raw/yelp_subset_5k.csv
# Kalau struktur folder Drive Anda berbeda (nama folder lain, lokasi lain),
# ganti semua path yang diawali "/content/drive/MyDrive/a2fusionrs/" di
# bawah ini sesuai lokasi riil Anda. Cek dulu dengan:
#   !find /content/drive/MyDrive -maxdepth 3 -iname "data" -type d
#
# Jangan lupa mount Drive dulu di notebook sebelum menjalankan pipeline:
#   from google.colab import drive
#   drive.mount('/content/drive')

experiment:
  name: "yelp_quicktest_smoke_run_colab"
  seed: 42
  domain: "restaurant"

data:
  raw_path: "/content/drive/MyDrive/PHD-STUDENT/Code/A2-FusionRS/data/raw/yelp_subset_5k.csv"
  business_attributes_required: ["business_categories", "business_stars", "business_city"]
  min_reviews_per_user: 3
  min_reviews_per_item: 3

split:
  strategy: "user_based"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  cold_start_holdout: true
  output_dir: "/content/drive/MyDrive/PHD-STUDENT/Code/A2-FusionRS/data/splits/yelp_restaurant_quicktest"

preprocessing:
  lowercase: true
  remove_stopwords: true
  lemmatize: true
  max_seq_length: 128
  tokenizer: "bert-base-uncased"

sentiment_baseline:
  model_name: "bert-base-uncased"
  mode: "global"
  optimizer: "AdamW"
  learning_rate: 1.0e-5
  # Dinaikkan dari 8 (versi CPU lokal) ke 32 -- aman untuk GPU T4/L4 dengan
  # max_seq_length=128. Kalau muncul CUDA out of memory, turunkan kembali
  # ke 16, atau naikkan lagi ke 64 kalau memakai A100 dan !nvidia-smi
  # menunjukkan memori masih longgar.
  batch_size: 32
  epochs: 1
  max_grad_norm: 1.0

deepmf:
  embedding_dim: 32
  hidden_layers: [64, 32, 16]
  dropout: 0.3
  batch_size: 64
  learning_rate: 0.001
  # 0 -- Table 10 paper tidak menyebut negative sampling; diverifikasi
  # empiris di run penuh juga menyebabkan overfit (lihat yelp_config.yaml).
  negative_sampling_ratio: 0
  loss: "mse"
  optimizer: "sgd"

cbf_clustering:
  method: "kmeans"
  k_selection: "elbow"
  feature_sources: ["category_onehot", "tfidf_description", "sentiment_agg", "popularity_metrics"]
  pca_components: 20                # diturunkan dari 50 -- subset kecil, item lebih sedikit

fusion_baseline:
  method: "nmf_decision_tree"
  # Fitur mentah cuma 3 kolom (DeepMF, CBF, sentiment) -- NMF tidak bisa
  # punya komponen lebih banyak dari fitur input (Algorithm 1 paper pakai
  # contoh n_components=3).
  nmf_components: 3
  dt_max_depth: 5

evaluation:
  metrics: ["rmse", "mae", "precision_at_k", "recall_at_k", "ndcg_at_k"]
  k_values: [3, 5]
  n_seeds: 1
  significance_test: "wilcoxon"

logging:
  # Checkpoint WAJIB ke Drive (bukan /content/... lokal), karena session
  # storage Colab hilang total saat runtime disconnect.
  checkpoint_dir: "/content/drive/MyDrive/PHD-STUDENT/Code/A2-FusionRS/checkpoints/yelp_restaurant_quicktest"
  save_every_stage: true
