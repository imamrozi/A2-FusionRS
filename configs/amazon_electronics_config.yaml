# configs/amazon_electronics_config.yaml
# Konfigurasi eksperimen Fase 1 (replikasi baseline + ablasi ABSA) pada
# domain Amazon Electronics (e-commerce) -- generalisasi dari domain Yelp
# restoran, memakai loader & pipeline yang SAMA (dataset-agnostic), cuma
# beda sumber data & subset kolom bisnis opsional (tidak ada metadata
# kategori produk di sumber data ini, lihat prepare_amazon_dataset.py).
#
# File ini adalah BASIS (bukan `_base:` child) -- config lain domain
# Amazon (quicktest/colab/absa varian) mewarisi dari file ini via
# `_base: amazon_electronics_config.yaml` (src/config_utils.py).

experiment:
  name: "amazon_electronics_baseline_reimplementation"
  seed: 42
  domain: "amazon_electronics"

data:
  loader: "amazon"    # dispatch ke AmazonDatasetLoader (src/data_loader.py::LOADER_REGISTRY)
  raw_path: "data/raw/amazon_electronics/amazon_electronics_reviews.csv"   # hasil prepare_amazon_dataset.py
  business_attributes_required: []   # tidak ada file metadata produk terpisah di sumber data ini
  min_reviews_per_user: 5
  min_reviews_per_item: 5

split:
  strategy: "user_based"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  cold_start_holdout: true
  output_dir: "data/splits/amazon_electronics"

preprocessing:
  lowercase: true
  remove_stopwords: true
  lemmatize: true
  max_seq_length: 128     # konsisten dgn yelp_config.yaml (Table 5 baseline paper)
  tokenizer: "bert-base-uncased"

sentiment_baseline:
  model_name: "bert-base-uncased"
  mode: "global"
  optimizer: "AdamW"
  learning_rate: 1.0e-5
  batch_size: 16
  epochs: 3
  max_grad_norm: 1.0

deepmf:
  embedding_dim: 128
  hidden_layers: [256, 128, 64, 32]
  dropout: 0.3
  batch_size: 512
  learning_rate: 0.001
  negative_sampling_ratio: 0   # konsisten dgn temuan empiris di domain restoran (lihat yelp_config.yaml)
  loss: "mse"
  optimizer: "sgd"

cbf_clustering:
  method: "kmeans"
  k_selection: "elbow"
  # sentiment_agg & popularity_metrics tetap tersedia (dihitung dari kolom
  # stars/text TRAIN, bukan dari metadata bisnis) -- category_onehot &
  # tfidf_description tetap dicoba juga: category_onehot otomatis 0-dim
  # (tidak ada business_categories di domain ini, lihat log diagnostik baru
  # di cbf_clustering.py), tfidf_description tetap jalan dari teks review.
  feature_sources: ["category_onehot", "tfidf_description", "sentiment_agg", "popularity_metrics"]
  pca_components: 50

fusion_baseline:
  method: "nmf_decision_tree"
  nmf_components: 3
  dt_max_depth: 10

classical_cf:
  algorithms: ["item_knn", "svd"]
  item_knn:
    knn_k: 40
    knn_min_k: 1
    knn_sim_name: "cosine"
    knn_user_based: false
  svd:
    svd_n_factors: 100
    svd_n_epochs: 20
    svd_lr_all: 0.005
    svd_reg_all: 0.02

evaluation:
  metrics: ["rmse", "mae", "precision_at_k", "recall_at_k", "ndcg_at_k"]
  k_values: [5, 10, 20]
  n_seeds: 3
  significance_test: "wilcoxon"

logging:
  checkpoint_dir: "checkpoints/amazon_electronics"
  save_every_stage: true
