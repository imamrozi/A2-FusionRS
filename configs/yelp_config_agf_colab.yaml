# configs/yelp_config_agf_colab.yaml
# Versi Colab dari yelp_config_agf.yaml -- path Google Drive (lewat _base),
# hyperparameter agf: SAMA dengan versi lokal.

_base: yelp_config_colab.yaml

experiment:
  name: "restaurant_agf_colab"

agf:
  d: 64
  n_heads: 2
  epochs: 30
  batch_size: 512
  learning_rate: 0.001
  absa_source: "pyabsa"
