# configs/yelp_config_colab.yaml
#
# Versi Colab dari yelp_config.yaml (eksperimen FULL RUN sesungguhnya,
# BUKAN smoke test) -- path menunjuk langsung ke Google Drive.
#
# PENTING -- SESUAIKAN PATH INI DULU sesuai struktur Drive Anda:
#   !find /content/drive/MyDrive -maxdepth 3 -iname "data" -type d
#
# Mount Drive dulu di notebook sebelum menjalankan:
#   from google.colab import drive
#   drive.mount('/content/drive')

experiment:
  name: "yelp_baseline_reimplementation_colab"
  seed: 42
  domain: "restaurant"   # "restaurant" atau "hotel" - dijalankan terpisah sesuai baseline

data:
  raw_path: "/content/drive/MyDrive/PHD-STUDENT/Code/A2-FusionRS/data/raw/yelp_training_set_review.csv"
  business_attributes_required: ["business_categories", "business_stars", "business_city"]
  min_reviews_per_user: 5
  min_reviews_per_item: 5

split:
  strategy: "user_based"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  cold_start_holdout: true
  output_dir: "/content/drive/MyDrive/PHD-STUDENT/Code/A2-FusionRS/data/splits/yelp_restaurant"

preprocessing:
  lowercase: true
  remove_stopwords: true
  lemmatize: true
  # 128 (bukan 512) -- sesuai Table 5 baseline paper (Darraz et al.), juga
  # 4x lebih murah secara komputasi (attention kuadratik thd panjang
  # sequence) -- penting untuk budget compute Colab. 512 dari proposal
  # A2-FusionRS dipakai nanti khusus stream ABSA-BERT A2-FusionRS (Fase 2).
  max_seq_length: 128
  tokenizer: "bert-base-uncased"

sentiment_baseline:
  model_name: "bert-base-uncased"
  mode: "global"
  optimizer: "AdamW"
  learning_rate: 1.0e-5
  # Dinaikkan dari 16 (default CPU-friendly) ke 32 -- aman untuk GPU T4/L4
  # dengan max_seq_length=512. Naikkan ke 64 kalau memakai A100 dan memori
  # masih longgar (cek !nvidia-smi setelah beberapa batch pertama).
  batch_size: 32
  epochs: 3
  max_grad_norm: 1.0

deepmf:
  embedding_dim: 128
  hidden_layers: [256, 128, 64, 32]
  dropout: 0.3
  batch_size: 512
  learning_rate: 0.001
  negative_sampling_ratio: 4
  loss: "mse"
  optimizer: "sgd"

cbf_clustering:
  method: "kmeans"
  k_selection: "elbow"
  feature_sources: ["category_onehot", "tfidf_description", "sentiment_agg", "popularity_metrics"]

fusion_baseline:
  method: "nmf_decision_tree"
  # Fitur mentah cuma 3 kolom (DeepMF, CBF, sentiment) -- NMF tidak bisa
  # punya komponen lebih banyak dari fitur input. Algorithm 1 paper pakai
  # contoh n_components=3.
  nmf_components: 3
  dt_max_depth: 10

evaluation:
  metrics: ["rmse", "mae", "precision_at_k", "recall_at_k", "ndcg_at_k"]
  k_values: [5, 10, 20]
  n_seeds: 3
  significance_test: "wilcoxon"

logging:
  checkpoint_dir: "/content/drive/MyDrive/PHD-STUDENT/Code/A2-FusionRS/checkpoints/yelp_restaurant"
  save_every_stage: true
