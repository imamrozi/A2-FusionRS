# configs/yelp_config_quicktest.yaml
# Konfigurasi KHUSUS untuk smoke test pipeline end-to-end pada subset kecil
# (~5.000 baris, hasil scripts/make_subset.py). TUJUAN: verifikasi seluruh
# tahap 1-8 run_baseline.py berjalan tanpa error dan waktu eksekusi singkat
# (menit, bukan jam) -- BUKAN untuk menghasilkan angka RMSE yang dilaporkan
# di manuskrip. Setelah lolos smoke test, gunakan yelp_config.yaml (versi
# penuh) untuk eksperimen sesungguhnya.

experiment:
  name: "yelp_quicktest_smoke_run"
  seed: 42
  domain: "restaurant"

data:
  raw_path: "data/raw/yelp_subset_5k.csv"   # hasil scripts/make_subset.py
  business_attributes_required: ["business_categories", "business_stars", "business_city"]
  min_reviews_per_user: 3     # diturunkan dari 5 (proposal) karena subset kecil
  min_reviews_per_item: 3

split:
  strategy: "user_based"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  cold_start_holdout: true
  output_dir: "data/splits/yelp_restaurant_quicktest"

preprocessing:
  lowercase: true
  remove_stopwords: true
  lemmatize: true
  max_seq_length: 128          # diturunkan dari 512 -- cukup untuk smoke test, jauh lebih cepat
  tokenizer: "bert-base-uncased"

sentiment_baseline:
  model_name: "bert-base-uncased"
  mode: "global"
  optimizer: "AdamW"
  learning_rate: 1.0e-5
  batch_size: 4                 # diturunkan dari 16 -- aman untuk CPU/GPU kecil
  epochs: 1                     # diturunkan dari 3 -- cukup untuk cek pipeline jalan
  max_grad_norm: 1.0

deepmf:
  embedding_dim: 32             # diturunkan dari 128 -- subset kecil tidak butuh kapasitas besar
  hidden_layers: [64, 32, 16]   # diperkecil dari [256,128,64,32]
  dropout: 0.3
  batch_size: 64                # diturunkan dari 512 -- subset kecil, batch besar tidak relevan
  learning_rate: 0.001
  # 0 -- Table 10 paper tidak menyebut negative sampling; diverifikasi
  # empiris di run penuh juga menyebabkan overfit (lihat yelp_config.yaml).
  negative_sampling_ratio: 0
  loss: "mse"
  optimizer: "sgd"

cbf_clustering:
  method: "kmeans"
  k_selection: "elbow"
  feature_sources: ["category_onehot", "tfidf_description", "sentiment_agg", "popularity_metrics"]
  pca_components: 20                # diturunkan dari 50 -- subset kecil, item lebih sedikit

fusion_baseline:
  method: "nmf_decision_tree"
  # Fitur mentah cuma 3 kolom (DeepMF, CBF, sentiment) -- NMF tidak bisa
  # punya komponen lebih banyak dari fitur input (Algorithm 1 paper pakai
  # contoh n_components=3).
  nmf_components: 3
  dt_max_depth: 5               # diturunkan dari 10 -- cegah overfit ekstrem pada subset kecil

classical_cf:
  algorithms: ["item_knn", "svd"]
  item_knn:
    knn_k: 10                   # diturunkan dari 40 -- subset kecil
    knn_min_k: 1
    knn_sim_name: "cosine"
    knn_user_based: false
  svd:
    svd_n_factors: 20            # diturunkan dari 100 -- subset kecil
    svd_n_epochs: 5               # diturunkan dari 20 -- smoke test cepat
    svd_lr_all: 0.005
    svd_reg_all: 0.02

evaluation:
  metrics: ["rmse", "mae", "precision_at_k", "recall_at_k", "ndcg_at_k"]
  k_values: [3, 5]              # diturunkan dari [5,10,20] -- subset kecil, K besar kurang bermakna
  n_seeds: 1                    # cukup 1 seed untuk smoke test (bukan laporan final)
  significance_test: "wilcoxon"

logging:
  checkpoint_dir: "checkpoints/yelp_restaurant_quicktest"
  save_every_stage: true
