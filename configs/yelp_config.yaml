# configs/yelp_config.yaml
# Konfigurasi eksperimen Fase 1 - Fair Comparison dengan Darraz et al. (ESWA 2025)
# Domain: Yelp (restaurant & hotel), dataset harus IDENTIK dengan sumber baseline:
# https://data.world/brianray/yelp-reviews/workspace/file?filename=yelp_training_set_review.csv

experiment:
  name: "yelp_baseline_reimplementation"
  seed: 42
  domain: "restaurant"   # "restaurant" atau "hotel" - dijalankan terpisah sesuai baseline

data:
  raw_path: "data/raw/yelp_training_set_review.csv"
  # TODO(user): unduh manual dari link data.world di atas, lisensi/akses tidak
  # bisa diambil otomatis oleh Claude via web_fetch. Letakkan file di path ini.
  business_attributes_required: ["business_categories", "business_stars", "business_city"]
  min_reviews_per_user: 5     # filter cold-start ekstrem sebelum split utama
  min_reviews_per_item: 5

split:
  strategy: "user_based"       # split per-user, bukan per-baris acak (cegah leakage)
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  cold_start_holdout: true     # sisihkan user/item baru sebagai skenario evaluasi terpisah
  output_dir: "data/splits/yelp_restaurant"

preprocessing:
  lowercase: true
  remove_stopwords: true
  lemmatize: true
  # 128 (bukan 512) -- sesuai Table 5 baseline paper (Darraz et al.). Nilai
  # 512 dari proposal A2-FusionRS dipakai NANTI khusus untuk stream ABSA-BERT
  # A2-FusionRS sendiri (Fase 2, src/a2fusionrs/), BUKAN untuk reimplementasi
  # baseline ini -- baseline harus pakai hyperparameter asli paper untuk fair
  # comparison. 512 juga 4x lebih mahal secara komputasi (attention kuadratik
  # terhadap panjang sequence), signifikan untuk budget compute Colab Free.
  max_seq_length: 128
  tokenizer: "bert-base-uncased"

sentiment_baseline:
  model_name: "bert-base-uncased"
  mode: "global"                # baseline Darraz et al. = sentimen global, BUKAN per-aspek
  optimizer: "AdamW"
  learning_rate: 1.0e-5          # sesuai Table 1 baseline paper (bukan 2e-5 versi A2-FusionRS)
  # ASUMSI (perlu dinyatakan di manuskrip): Table 5 paper TIDAK melaporkan
  # jumlah epoch untuk training SA (beda dgn DeepMF yg eksplisit 20 epoch di
  # Table 10) -- 3 di sini adalah rule-of-thumb umum fine-tuning BERT,
  # BUKAN nilai yang diverifikasi dari paper.
  # batch_size juga beda dari Table 5 paper (8) -- dinaikkan ke 16 karena
  # alasan compute/waktu training, bukan replikasi persis hyperparameter.
  # Table 5 juga menyebut "test size 30%" khusus utk sub-task SA (split
  # terpisah dari split CF/CB) -- pipeline ini reuse split 80/10/10 yang
  # sama untuk SA maupun CF/CB, deviasi lain yang perlu dicatat.
  batch_size: 16
  epochs: 3
  max_grad_norm: 1.0

deepmf:
  embedding_dim: 128
  hidden_layers: [256, 128, 64, 32]
  dropout: 0.3
  batch_size: 512
  learning_rate: 0.001
  negative_sampling_ratio: 4
  loss: "mse"
  optimizer: "sgd"

cbf_clustering:
  method: "kmeans"              # baseline: K-Means (restoran), Agglomerative (hotel)
  k_selection: "elbow"
  feature_sources: ["category_onehot", "tfidf_description", "sentiment_agg", "popularity_metrics"]
  # Reduksi dimensi sebelum clustering, sesuai Fig. 5 paper (Concatenation ->
  # PCA -> Clustering). Tanpa ini, silhouette score jauh lebih rendah dari
  # paper (curse of dimensionality di ruang fitur ~1300+ dim).
  pca_components: 50

fusion_baseline:
  method: "nmf_decision_tree"   # sesuai baseline: NMF + DecisionTreeRegressor
  # Fitur mentah cuma 3 kolom (DeepMF, CBF, sentiment) -- NMF tidak bisa
  # punya komponen lebih banyak dari fitur input. Algorithm 1 paper pakai
  # contoh n_components=3.
  nmf_components: 3
  dt_max_depth: 10

evaluation:
  metrics: ["rmse", "mae", "precision_at_k", "recall_at_k", "ndcg_at_k"]
  k_values: [5, 10, 20]
  n_seeds: 3                    # ulangi dengan 3 seed berbeda, laporkan mean +/- std
  significance_test: "wilcoxon"

logging:
  checkpoint_dir: "checkpoints/yelp_restaurant"
  save_every_stage: true        # simpan checkpoint tiap stage (SA, DeepMF, CBF, fusion)
  # PENTING untuk Colab: checkpoint_dir sebaiknya di-mount ke Google Drive
  # agar tahan terhadap disconnect runtime.
