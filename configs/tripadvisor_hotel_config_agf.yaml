# configs/tripadvisor_hotel_config_agf.yaml
# A2-FusionRS Fase 2: overlay Attention-Gated Fusion di atas config domain
# TripAdvisor Hotel Fase 1 -- reuse SEMUA hyperparameter DeepMF/CBF/data/
# split/SA apa adanya (lihat _base), cuma menambah blok `agf:` baru.
# Skenario ablasi dipilih via CLI --scenario di
# run_attention_gated_fusion.py, BUKAN file config terpisah per skenario.

_base: tripadvisor_hotel_config.yaml

experiment:
  name: "tripadvisor_hotel_agf"

agf:
  d: 64
  n_heads: 2
  epochs: 30
  batch_size: 512
  learning_rate: 0.001
  absa_source: "pyabsa"
