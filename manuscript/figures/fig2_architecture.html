<title>Fig. 2 — A2-FusionRS Architecture</title>
<style>
  :root {
    --page:#EEF1F4; --paper:#FFFFFF; --ink:#1F2933; --muted:#5A6675;
    --arrow:#33404E; --modb:#BCC6D0; --modlab:#54626F;
    --deepmf:#3E6DA6; --deepmf-f:#E7EEF6; --cbf:#2C8A78; --cbf-f:#E3F1EC;
    --absa:#BE7A2E; --absa-f:#F7EEDD; --fusion:#5A54B0; --fusion-f:#ECEBF7;
    --output:#B04A63; --output-f:#F7E8EC; --band:#F1F4F7;
    --sans: system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono: "SFMono-Regular",ui-monospace,"JetBrains Mono",Consolas,"Liberation Mono",monospace;
  }
  @media (prefers-color-scheme: dark) { :root { --page:#0F151A; } }
  :root[data-theme="dark"] { --page:#0F151A; }
  :root[data-theme="light"] { --page:#EEF1F4; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--page); font-family:var(--sans); line-height:1.5; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:1040px; margin:0 auto; padding:30px 20px 44px; }
  .paper { background:var(--paper); color:var(--ink); border:1px solid #D8DEE5;
    border-radius:6px; padding:26px 24px 20px; box-shadow:0 2px 14px rgba(20,40,60,.10); }
  .scroll { overflow-x:auto; }
  .diagram { position:relative; min-width:820px; padding:4px 2px; }
  svg.conn { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; }
  .flow { display:grid; grid-template-columns:.5fr 1.3fr 1.02fr .96fr; gap:32px; position:relative; z-index:2; align-items:stretch; }
  .stage { display:flex; flex-direction:column; }
  .module { position:relative; border:1.1px dashed var(--modb); border-radius:11px;
    padding:24px 9px 11px; display:flex; flex-direction:column; flex:1; }
  .module > .mlabel { position:absolute; top:-8px; left:12px; background:var(--paper);
    padding:0 7px; font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--modlab); }
  .col { display:flex; flex-direction:column; gap:14px; justify-content:center; flex:1; }
  .instrip { display:flex; flex-direction:column; gap:14px; justify-content:center; flex:1; }
  .node { background:var(--paper); border:1.4px solid var(--nc,#AEB8C2); border-radius:7px; padding:9px 11px; }
  .node .t { font-size:13.5px; font-weight:620; letter-spacing:-.01em; }
  .node .s { font-size:11px; color:var(--muted); margin-top:2px; }
  .node.io { border-style:solid; background:var(--band); }
  .node.io .t { font-size:12px; font-weight:560; }
  .node.io .m { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:1px; }
  .node.deepmf { --nc:var(--deepmf); background:var(--deepmf-f); }
  .node.cbf { --nc:var(--cbf); background:var(--cbf-f); }
  .node.absa { --nc:var(--absa); background:var(--absa-f); }
  .node.fusion { --nc:var(--fusion); background:var(--fusion-f); }
  .node.out { --nc:var(--output); background:var(--output-f); text-align:center; }
  .node.sum { --nc:var(--output); background:var(--output-f); text-align:center; }
  .node.sum .big { font-size:18px; font-weight:700; color:var(--output); line-height:1.15; font-family:var(--mono); }
  .node.sum .s { font-family:var(--mono); }
  .tag { font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:3px; }
  .baselane { display:grid; grid-template-columns:.5fr 1.3fr 1.02fr .96fr; gap:32px; margin-top:34px; position:relative; z-index:2; }
  .module.base { grid-column:2 / 4; padding-top:22px; }
  .module.base .node { --nc:#8C99A6; background:repeating-linear-gradient(135deg,
      var(--band), var(--band) 8px, #E6EBF0 8px, #E6EBF0 16px); }
  .module.base .node .t { font-size:12.5px; }
  .module.base .node .s { font-size:10.5px; }
  figcaption { margin-top:18px; font-size:12.5px; color:var(--muted); max-width:82ch; line-height:1.55; }
  figcaption b { color:var(--ink); font-weight:700; }
  .cap-eq { font-family:var(--mono); font-size:12px; color:var(--ink);
    background:var(--band); border:1px solid #D8DEE5; border-radius:6px; padding:5px 9px; margin-top:6px; display:inline-block; }
  .lg { display:flex; gap:20px; flex-wrap:wrap; margin-top:14px; font-size:11.5px; color:var(--muted); }
  .lg span { display:inline-flex; align-items:center; gap:7px; }
  @media print { body { background:#fff; } .paper { box-shadow:none; border:none; } }
</style>

<div class="wrap">
  <div class="paper">
    <figure style="margin:0;">
      <div class="scroll">
        <div class="diagram" id="diagram">
          <svg class="conn" id="conn" aria-hidden="true">
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill="var(--arrow)"></path>
              </marker>
              <marker id="arrow-base" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill="var(--muted)"></path>
              </marker>
            </defs>
          </svg>
          <div class="flow">
            <div class="stage">
              <div class="instrip">
                <div class="node io" id="in-rate"><div class="t">User–Item ratings</div><div class="m">r_ui</div></div>
                <div class="node io" id="in-rev"><div class="t">Review text</div><div class="m">d_ui</div></div>
              </div>
            </div>
            <div class="stage">
              <div class="module" id="mod-enc">
                <span class="mlabel">Modality Encoding</span>
                <div class="col">
                  <div class="node deepmf" id="e-mf"><div class="t">DeepMF</div><div class="s">collaborative → scalar r̂_MF</div></div>
                  <div class="node cbf" id="e-cbf"><div class="t">CBF</div><div class="s">content → scalar r̂_CBF</div></div>
                  <div class="node absa" id="e-kw"><div class="t">Keyword-ABSA</div><div class="s">fixed taxonomy → vector</div></div>
                  <div class="node absa" id="e-py"><div class="t">PyABSA → Aspect-Sequence Pooling</div><div class="s">open-vocab, masked query-attention → vector</div></div>
                </div>
              </div>
            </div>
            <div class="stage">
              <div class="module">
                <span class="mlabel">Attention-Gated Fusion</span>
                <div class="col">
                  <div class="node fusion" id="f-attn"><div class="t">Multi-Head Cross-Attention</div><div class="s">contextualizes the 4 tokens (d = 64)</div></div>
                  <div class="node fusion" id="f-gate"><div class="t">Gated Pooling</div><div class="s">softmax gate α per modality</div></div>
                </div>
              </div>
            </div>
            <div class="stage">
              <div class="module">
                <span class="mlabel">Residual Prediction</span>
                <div class="col">
                  <div class="node fusion" id="head"><div class="t">Prediction Head</div><div class="tag">→ Δ</div></div>
                  <div class="node sum" id="sum"><div class="big">⊕</div><div class="s">r̂_base + Δ</div></div>
                  <div class="node out" id="out"><div class="t">Predicted rating r̂</div></div>
                </div>
              </div>
            </div>
          </div>
          <div class="baselane">
            <div class="module base">
              <span class="mlabel">Static Fusion Base</span>
              <div class="node" id="base">
                <div class="t">A2-IRM base — NMF + Decision Tree</div>
                <div class="s">static fusion over r̂_MF, r̂_CBF, keyword-ABSA · 5-fold OOF → r̂_base</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="lg">
        <span><span style="width:24px;border-top:1.8px solid var(--arrow);"></span>attention path (Δ correction)</span>
        <span><span style="width:24px;border-top:1.6px dashed var(--muted);"></span>static-base path (DeepMF, CBF, keyword-ABSA → r̂_base; excludes PyABSA)</span>
      </div>
      <figcaption>
        <b>Fig. 2.</b> Overall architecture of the proposed A2-FusionRS. The collaborative (DeepMF) and
        content (CBF) streams contribute calibrated scalar predictions, whereas the sentiment stream is kept
        rich: keyword-ABSA as a confidence-weighted vector and open-vocabulary PyABSA as a variable-length
        per-aspect sequence pooled by a learned masked query-attention. The four projected tokens are gathered
        on a shared bus into multi-head cross-attention and merged by a softmax gate; a small head emits an
        additive correction over the static A2-IRM base — itself fused from the DeepMF, CBF, and keyword-ABSA
        signals — giving the residual prediction
        <br><span class="cap-eq">r̂ = r̂_base + Δ,&nbsp;&nbsp;Δ = Head( Σₖ αₖ · tokenₖ )</span>
      </figcaption>
    </figure>
  </div>
</div>

<script>
  // orthogonal edges (everything EXCEPT the encoder->fusion fan-in, which uses a bus)
  const EDGES = [
    {from:"in-rate",to:"e-mf",fs:"r",ts:"l"}, {from:"in-rate",to:"e-cbf",fs:"r",ts:"l"},
    {from:"in-rev",to:"e-cbf",fs:"r",ts:"l"}, {from:"in-rev",to:"e-kw",fs:"r",ts:"l"}, {from:"in-rev",to:"e-py",fs:"r",ts:"l"},
    {from:"f-attn",to:"f-gate",fs:"b",ts:"t"}, {from:"f-gate",to:"head",fs:"r",ts:"l"},
    {from:"head",to:"sum",fs:"b",ts:"t"}, {from:"sum",to:"out",fs:"b",ts:"t"},
    {from:"e-mf",to:"base",fs:"r",ts:"t",kind:"base",sf:0.72,tf:0.56},
    {from:"e-cbf",to:"base",fs:"r",ts:"t",kind:"base",sf:0.72,tf:0.68},
    {from:"e-kw",to:"base",fs:"r",ts:"t",kind:"base",sf:0.72,tf:0.80},
    {from:"base",to:"sum",fs:"r",ts:"l",kind:"base"},
  ];
  const BUS_SOURCES = ["e-mf","e-cbf","e-kw","e-py"];
  const conn = document.getElementById("conn"), diagram = document.getElementById("diagram");
  const NS = "http://www.w3.org/2000/svg";
  function anchor(el, side, box, frac=0.5) {
    const r = el.getBoundingClientRect(); const x = r.left - box.left, y = r.top - box.top;
    switch (side) {
      case "r": return {x:x+r.width, y:y+r.height*frac};
      case "l": return {x:x, y:y+r.height*frac};
      case "t": return {x:x+r.width*frac, y:y};
      case "b": return {x:x+r.width*frac, y:y+r.height};
    }
  }
  function orthPoints(p1,s1,p2,s2,mid) {
    const h1=(s1==="l"||s1==="r"), h2=(s2==="l"||s2==="r"); const pts=[p1];
    if (h1&&h2){ const mx=p1.x+(p2.x-p1.x)*(mid??0.5); pts.push({x:mx,y:p1.y},{x:mx,y:p2.y}); }
    else if (!h1&&!h2){ const my=p1.y+(p2.y-p1.y)*(mid??0.5); pts.push({x:p1.x,y:my},{x:p2.x,y:my}); }
    else if (h1&&!h2){ pts.push({x:p2.x,y:p1.y}); }
    else { pts.push({x:p1.x,y:p2.y}); }
    pts.push(p2); return pts;
  }
  function roundedPath(pts,r) {
    if (pts.length<2) return "";
    let d = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
    for (let i=1;i<pts.length-1;i++) {
      const p0=pts[i-1], p1=pts[i], p2=pts[i+1];
      const v1x=p1.x-p0.x, v1y=p1.y-p0.y, v2x=p2.x-p1.x, v2y=p2.y-p1.y;
      const l1=Math.hypot(v1x,v1y)||1, l2=Math.hypot(v2x,v2y)||1; const rr=Math.min(r,l1/2,l2/2);
      const a={x:p1.x-v1x/l1*rr, y:p1.y-v1y/l1*rr}, b={x:p1.x+v2x/l2*rr, y:p1.y+v2y/l2*rr};
      d += ` L${a.x.toFixed(1)},${a.y.toFixed(1)} Q${p1.x.toFixed(1)},${p1.y.toFixed(1)} ${b.x.toFixed(1)},${b.y.toFixed(1)}`;
    }
    const last=pts[pts.length-1]; d += ` L${last.x.toFixed(1)},${last.y.toFixed(1)}`; return d;
  }
  function addPath(d, {dash=false, marker=true}={}) {
    const p=document.createElementNS(NS,"path"); p.setAttribute("class","edge");
    p.setAttribute("d",d); p.setAttribute("fill","none");
    p.setAttribute("stroke", dash?"var(--muted)":"var(--arrow)");
    p.setAttribute("stroke-width", dash?"1.5":"1.6");
    if (dash) p.setAttribute("stroke-dasharray","6 4");
    if (marker) p.setAttribute("marker-end", dash?"url(#arrow-base)":"url(#arrow)");
    conn.appendChild(p);
  }
  function addDot(x,y) {
    const c=document.createElementNS(NS,"circle"); c.setAttribute("class","edge");
    c.setAttribute("cx",x.toFixed(1)); c.setAttribute("cy",y.toFixed(1)); c.setAttribute("r","2.6");
    c.setAttribute("fill","var(--arrow)"); conn.appendChild(c);
  }
  function drawBus(box) {
    const fa = anchor(document.getElementById("f-attn"),"l",box);
    const srcs = BUS_SOURCES.map(id => anchor(document.getElementById(id),"r",box));
    const encRight = Math.max(...srcs.map(p=>p.x));
    const busx = encRight + (fa.x - encRight)*0.5;
    const ys = srcs.map(p=>p.y).concat([fa.y]);
    addPath(`M${busx.toFixed(1)},${Math.min(...ys).toFixed(1)} L${busx.toFixed(1)},${Math.max(...ys).toFixed(1)}`, {marker:false});
    for (const p of srcs) { addPath(`M${p.x.toFixed(1)},${p.y.toFixed(1)} L${busx.toFixed(1)},${p.y.toFixed(1)}`, {marker:false}); addDot(busx,p.y); }
    addPath(`M${busx.toFixed(1)},${fa.y.toFixed(1)} L${fa.x.toFixed(1)},${fa.y.toFixed(1)}`, {marker:true});
  }
  function draw() {
    [...conn.querySelectorAll(".edge")].forEach(p => p.remove());
    const box = diagram.getBoundingClientRect();
    conn.setAttribute("viewBox", `0 0 ${box.width} ${box.height}`);
    for (const e of EDGES) {
      const a=document.getElementById(e.from), b=document.getElementById(e.to);
      if (!a||!b) continue;
      const p1=anchor(a,e.fs,box,e.sf??0.5), p2=anchor(b,e.ts,box,e.tf??0.5);
      addPath(roundedPath(orthPoints(p1,e.fs,p2,e.ts,e.mid),7), {dash:e.kind==="base", marker:true});
    }
    drawBus(box);
  }
  new ResizeObserver(draw).observe(diagram);
  window.addEventListener("load", draw); window.addEventListener("resize", draw); draw();
</script>
